services:
  backend:
    build:
      context: ./backend
    container_name: em-backend
    expose:
      - "8080"
    networks:
      - em-network
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: em-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - em-network
    restart: unless-stopped

networks:
  em-network:
    driver: bridge
